name: Extract ZIP

on:
  push:
    branches:
      - main
    paths:
      - "25-04-99.zip"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: unzip -o "25-04-99.zip" -d .

      - run: rm "25-04-99.zip"

      - run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git diff --cached --quiet || git commit -m "Extract ZIP"
          git push
