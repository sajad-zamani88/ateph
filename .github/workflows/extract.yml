name: Extract ZIP

on:
  push:
    paths:
      - "site.zip"

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip
        run: |
          unzip -o 11-04-99.zip -d .

      - name: Delete zip
        run: rm site.zip

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Extract site.zip"
            git push
          fi
